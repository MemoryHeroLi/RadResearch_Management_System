{% extends "base.html" %}
{% block title %}{{ '编辑' if point else '新增' }}技术点{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ '编辑' if point else '新增' }}技术点</h1>
    <p>填写技术点的基本信息</p>
</div>

<form method="post">
    <div class="form-group">
        <label class="form-label">技术点名称 <span class="required">*</span></label>
        <input type="text" name="name" class="form-input" required value="{{ point.name if point else '' }}">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label class="form-label">技术方向 <span class="required">*</span></label>
            <select name="direction" class="form-select" required>
                {% for d in directions %}
                <option value="{{ d }}" {% if point and point.direction == d %}selected{% endif %}>{{ d }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">状态</label>
            <select name="status" class="form-select">
                {% for st in ['进行中', '已完成', '暂停'] %}
                <option value="{{ st }}" {% if point and point.status == st %}selected{% endif %}>{{ st }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label">负责人</label>
        <select name="owner" class="form-select">
            <option value="">-- 请选择负责人 --</option>
            {% for m in members %}
            <option value="{{ m.name }}" {% if point and point.owner == m.name %}selected{% endif %}>{{ m.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label class="form-label">需求来源</label>
        <input type="text" name="source" class="form-input" value="{{ point.source if point else '' }}">
    </div>

    <div class="form-group">
        <label class="form-label">详细描述</label>
        <textarea name="description" class="form-textarea" rows="4">{{ point.description if point else '' }}</textarea>
    </div>

    <div class="form-actions">
        <button class="btn btn-primary">保存</button>
        <a href="{{ url_for('business.list_tech_points') }}" class="btn btn-outline">取消</a>
    </div>
</form>

{% if not point %}
<div class="alert alert-info mt-4">新建后将按标准预研流程自动生成 4 个阶段、共 22 个子步骤的跟踪记录。</div>
{% endif %}
{% endblock %}
