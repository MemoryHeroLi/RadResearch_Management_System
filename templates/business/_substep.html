<div class="substep-card {{ 'completed' if sp.is_completed else 'todo' }}">
    <div class="substep-header">
        <div>
            <strong>{{ sp.sub_step }}</strong>
            {% if sp.sub_step in gate_steps %}<span class="gate-badge">关卡</span>{% endif %}
        </div>
        <form method="post" action="{{ url_for('business.toggle_substep', sp_id=sp.id) }}" style="margin:0;">
            <input type="checkbox" class="substep-check" onchange="this.form.submit()" {% if sp.is_completed %}checked{% endif %}>
        </form>
    </div>
    {% if sp.is_completed %}
    <div class="substep-meta">完成于 {{ sp.completed_at.strftime('%Y-%m-%d') if sp.completed_at else '' }}</div>
    {% endif %}
    {% if sp.notes %}
    <div class="substep-notes">{{ sp.notes }}</div>
    {% endif %}
    {% for doc in sp.documents %}
    <div class="substep-docs flex-between">
        <a href="{{ url_for('business.download_doc', doc_id=doc.id) }}">📎 {{ doc.original_name }}</a>
        <form method="post" action="{{ url_for('business.delete_doc', doc_id=doc.id) }}" style="display:inline;">
            <button class="btn btn-sm" style="color:var(--color-destructive);font-size:10px;padding:0 4px;border:none;background:none;cursor:pointer;" onclick="return confirm('确认移除该文件？')" title="移除">✕</button>
        </form>
    </div>
    {% endfor %}
    <form method="post" action="{{ url_for('business.upload_doc', sp_id=sp.id) }}" enctype="multipart/form-data" class="substep-upload">
        <input type="file" name="file" required>
        <input type="text" name="doc_type" placeholder="类型">
        <button class="btn btn-primary btn-sm">上传</button>
    </form>
</div>
