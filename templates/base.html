<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}放射影像算法研究部管理系统{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo">R</div>
            <div class="brand-text">
                <span class="brand-name">RadResearch</span>
                <span class="brand-sub">放射影像 · 算法研究部</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard.index') }}" class="{% if request.blueprint == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">◉</span>仪表盘
            </a>
            <a href="{{ url_for('business.list_tech_points') }}" class="{% if request.blueprint == 'business' %}active{% endif %}">
                <span class="nav-icon">◫</span>业务管理
            </a>
            <a href="{{ url_for('team.list_members') }}" class="{% if request.blueprint == 'team' %}active{% endif %}">
                <span class="nav-icon">◎</span>团队管理
            </a>
            <a href="{{ url_for('process.list_issues') }}" class="{% if request.blueprint == 'process' %}active{% endif %}">
                <span class="nav-icon">▦</span>流程制度
            </a>
        </nav>
        <div class="sidebar-footer">© 2026 RadResearch v2.0</div>
    </aside>

    <main class="main">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    <span>{{ message }}</span>
                    <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
                </div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
